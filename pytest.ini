[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Markers for categorizing tests
markers =
    property: Property-based tests using Hypothesis
    integration: Integration tests with mock backend
    mirror: Tests validating Python mirror implementations

# Hypothesis default profile (min 100 examples)
addopts = --hypothesis-profile=default -v
